name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Generate test fixtures
        run: npm run test:fixtures

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  publish:
    runs-on: ubuntu-latest
    needs: build
    # Trusted Publishing (OIDC) requires id-token: write.
    # No NPM_TOKEN needed — npm CLI auto-detects OIDC and publishes with provenance.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Error: package.json version ($PACKAGE_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "Version verified: $PACKAGE_VERSION"

      # Trusted Publisher + provenance つき publish。
      # Node 同梱の npm 10.x は OIDC 連携が不完全で 404 になるため、
      # npx で最新の npm（11.x 以降）を明示的に使う。
      # `npm install -g npm@latest` はインストール先の @npmcli/arborist が
      # 壊れて MODULE_NOT_FOUND になる既知の問題があるため採用しない。
      # id-token: write 権限があり、かつ npmjs.com 側で Trusted Publisher が
      # 設定されていれば NPM_TOKEN は不要。
      - name: Publish to npm
        run: npx npm@latest publish --provenance --access public
