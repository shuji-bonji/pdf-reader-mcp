name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      # qpdf is used by tests/fixtures/create-test-pdf.ts to generate
      # `linearized.pdf`, the regression fixture for Issue #1
      # (Linearized PDF support in inspect_structure / inspect_fonts).
      # Without it the linearized regression block is silently skipped.
      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install -y qpdf

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Generate test fixtures
        run: npm run test:fixtures

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e
